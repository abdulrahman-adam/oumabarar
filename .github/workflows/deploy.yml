name: Deploy Oumabarar to VPS

on:
  push:
    branches:
      - main  # Trigger only on push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/oumabarar
            git fetch --all
            git reset --hard origin/main
            
            # Use the clean docker-compose we created
            docker compose up -d --build
            
            # Clean up old images to save space on VPS
            docker image prune -f