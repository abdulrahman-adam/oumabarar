services:
  # ========================
  # DATABASE (MySQL)
  # ========================
  db:
    image: mysql:8.0
    container_name: oumabarar_db
    restart: always
    # Optimized for compatibility with Node/PHP drivers
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - ./backend/.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3311:3306"
    volumes:
      - oumabarar_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - oumabarar-network

  # ========================
  # BACKEND (Node.js)
  # ========================
  backend:
    build: ./backend
    container_name: oumabarar_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - MYSQL_HOST=db  # Internal Docker DNS name
      - PORT=5000
    ports:
      - "4003:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - oumabarar-network

  # ========================
  # FRONTEND (React/Vite + Nginx)
  # ========================
  frontend:
    build: ./frontend
    container_name: oumabarar_frontend
    restart: always
    ports:
      - "3004:80"
    networks:
      - oumabarar-network

  # ========================
  # PHPMYADMIN
  # ========================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: oumabarar_phpmyadmin
    restart: always
    ports:
      - "8093:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_ARBITRARY=1
    depends_on:
      db:
        condition: service_healthy
    networks:
      - oumabarar-network

volumes:
  oumabarar_mysql_data:

networks:
  oumabarar-network:
    driver: bridge